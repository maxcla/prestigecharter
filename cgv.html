                    <h2 data-fr="4. Annulation" data-en="4. Cancellation"></h2>
                    <p data-fr="En cas d'annulation :" data-en="In case of cancellation:"></p>
                    <ul>
                        <li data-fr="Plus de 7 jours avant la prestation : remboursement intégral de l'acompte" data-en="More than 7 days before the service: full refund of the deposit"></li>
                        <li data-fr="Entre 7 et 3 jours avant la prestation : acompte conservé, report possible" data-en="Between 7 and 3 days before the service: deposit retained, rescheduling possible"></li>
                        <li data-fr="Moins de 3 jours avant la prestation : aucun remboursement" data-en="Less than 3 days before the service: no refund"></li>
                    </ul>

                    <h2 data-fr="5. Conditions météo" data-en="5. Weather conditions"></h2>
                    <p data-fr="En cas de conditions météo défavorables rendant la navigation dangereuse, le skipper peut annuler la prestation. Dans ce cas, un report ou un remboursement intégral sera proposé." data-en="In case of unfavorable weather conditions making navigation dangerous, the skipper may cancel the service. In this case, a rescheduling or full refund will be offered."></p>

                    <h2 data-fr="6. Responsabilités" data-en="6. Liabilities"></h2>

                    <h2 data-fr="8. Litiges" data-en="8. Disputes"></h2>
