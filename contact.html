    <main>
        <section class="hero contact-hero" style="background-image: url('images/yacht-2.webp');">
            <div class="hero-content">
                <h1 data-fr="Contactez-nous" data-en="Contact us"></h1>
                <p data-fr="Pour toute question ou réservation, nous sommes à votre disposition" data-en="For any questions or bookings, we are at your disposal"></p>
                <a href="#contact-form" class="cta-button" data-fr="Envoyer un message" data-en="Send a message"></a>
            </div>
        </section>

        <section class="section contact-intro fade-in">
            <div class="container">
                <h2 data-fr="Notre équipe est à votre écoute" data-en="Our team is at your service"></h2>
                <p data-fr="Que ce soit pour une question sur nos prestations, une réservation ou un simple renseignement, n'hésitez pas à nous contacter." data-en="Whether you have questions about our services, want to make a booking, or just need information, don't hesitate to contact us."></p>
                <p data-fr="Nous répondons généralement sous 24h." data-en="We usually respond within 24 hours."></p>
            </div>
        </section>

                        </svg>
                    </div>
                    <div class="contact-details">
                        <h3 data-fr="Téléphone" data-en="Phone"></h3>
                        <p><a href="tel:+33652192414">06 52 19 24 14</a></p>
                        <p><a href="tel:+33652192414">06 52 19 24 14 (WhatsApp)</a></p>
                    </div>
                </div>

                <div class="contact-card">

                        </svg>
                    </div>
                    <div class="contact-details">
                        <h3 data-fr="Email" data-en="Email"></h3>
                        <p><a href="mailto:prestigecharter06@gmail.com">prestigecharter06@gmail.com</a></p>
                    </div>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="#C9A84C">
                            <path d="M12,2C8.13,2 5,5.13 5,9C5,14.25 12,22 12,22C12,22 19,14.25 19,9C19,5.13 15.87,2 12,2M12,4C7.59,4 4,7.59 4,12C4,16.41 7.59,20 12,20C16.41,20 20,16.41 20,12C20,7.59 16.41,4 12,4Z"/>

                        </svg>
                    </div>
                    <div class="contact-details">
                        <h3 data-fr="Port d'attache" data-en="Home port"></h3>
                        <p data-fr="Saint-Jean-Cap-Ferrat, Côte d'Azur" data-en="Saint-Jean-Cap-Ferrat, French Riviera"></p>
                    </div>
                </div>
            </div>
        </section>

        <section class="section contact-form-container fade-in" id="contact-form">
            <div class="container">
                <h2 data-fr="Formulaire de contact" data-en="Contact form"></h2>
                <form class="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact-name" data-fr="Nom" data-en="Name"></label>
                            <input type="text" id="contact-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-email" data-fr="Email" data-en="Email"></label>
                            <input type="email" id="contact-email" name="email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact-phone" data-fr="Téléphone" data-en="Phone"></label>
                            <input type="tel" id="contact-phone" name="phone">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact-subject" data-fr="Sujet" data-en="Subject"></label>
                            <select id="contact-subject" name="subject">
                                <option value="" data-fr="Sélectionnez un sujet" data-en="Select a subject"></option>
                                <option value="reservation" data-fr="Réservation" data-en="Booking"></option>
                                <option value="question" data-fr="Question" data-en="Question"></option>
                                <option value="information" data-fr="Information" data-en="Information"></option>
                                <option value="autre" data-fr="Autre" data-en="Other"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact-message" data-fr="Message" data-en="Message"></label>
                            <textarea id="contact-message" name="message" rows="6" required></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <input type="checkbox" id="contact-terms" name="terms" required>
                            <label for="contact-terms" data-fr="J'accepte que mes données soient traitées pour répondre à ma demande" data-en="I agree that my data will be processed to answer my request"></label>
                        </div>
                    </div>

                    <div class="form-row">
                        <button type="submit" class="cta-button" data-fr="Envoyer le message" data-en="Send message"></button>
                    </div>
                </form>
            </div>
        </section>

        <section class="section social-links fade-in">
            <div class="container">
                <h2 data-fr="Suivez-nous" data-en="Follow us"></h2>
                <div class="social-icons">
                    <a href="https://www.instagram.com/prestigecharter06/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="#C9A84C">
                            <path d="M12 2.199c3.148 0 5.7 2.426 5.7 5.574 0 1.404-.447 2.64-1.284 3.716-.413.509-.608 1.078-.608 1.604v.024c0 1.109.691 2.084 1.608 2.505 1.735 0.846 3.2 2.346 3.2 4.896v.06C21.3 20.248 19.833 22 18 22h-5.999C8.167 22 6.7 20.248 6.7 18.182v-.06c0-2.55 1.465-4.05-3.2-4.896-.917-.421-1.608-1.396-1.608-2.505V12.21c0-.526.195-.99.608-1.604.837-1.076 1.283-2.312 1.283-3.716C6.3 4.626 9.852 2.199 12 2.199z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </section>

        <section class="section cta-section fade-in">
            <div class="container">
                <h2 data-fr="Prêt à vivre l'expérience ?" data-en="Ready for the experience?"></h2>
                <p data-fr="Contactez-nous pour réserver votre journée en mer" data-en="Contact us to book your day at sea"></p>
                <a href="reservation.html" class="cta-button" data-fr="Réserver maintenant" data-en="Book now"></a>
            </div>
        </section>
