                <text x="10" y="25" font-family="'Playfair Display', serif" font-size="20" fill="#FFFFFF">PRESTIGE</text>
                <text x="70" y="25" font-family="'Playfair Display', serif" font-size="20" font-weight="bold" fill="#C9A84C">CHARTER</text>
                <path d="M50,0 L50,10 L45,15 L50,20 L55,15 L50,10 Z" fill="#C9A84C" transform="translate(0, 5)"/>
            </svg>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="yacht.html">Le Yacht</a></li>

            </ul>

        <div class="language-toggle">
            <button data-fr="FR" data-en="EN">FR</button>
        </div>
    </header>

    <main>
        <section class="hero tarifs-hero">
            <img src="images/yacht-1.jpg" alt="Yacht Artemis" loading="lazy">
            <div class="hero-content">
                <h1 data-fr="Nos tarifs" data-en="Our rates"></h1>
                <p data-fr="Des expériences de luxe à des prix compétitifs" data-en="Luxury experiences at competitive prices"></p>
                <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
            </div>
        </section>

        <section class="section tarifs-intro fade-in">
            <div class="container">
                <h2 data-fr="Tarifs toute l'année" data-en="Year-round rates"></h2>
                <p data-fr="Nos tarifs sont fixes toute l'année. Pas de saison, pas de surprise." data-en="Our rates are fixed all year round. No seasons, no surprises."></p>
                <p data-fr="Le carburant n'est pas inclus dans les tarifs et est facturé au réel selon l'itinéraire choisi." data-en="Fuel is not included in the rates and is billed at actual cost according to the chosen itinerary."></p>
            </div>
        </section>

        <section class="section tarifs-grid fade-in">
            <div class="container">
                <h2 data-fr="Nos offres" data-en="Our offers"></h2>
                <div class="tarifs-container">
                    <div class="tarif-card">
                        <h3 data-fr="Sunset Experience" data-en="Sunset Experience"></h3>
                        <div class="tarif-price">
                            <span data-fr="À partir de" data-en="From"></span>
                            <span data-fr="1 300 €" data-en="1 300 €"></span>
                            <span data-fr="TTC" data-en="VAT included"></span>
                        </div>
                        <ul class="tarif-includes">
                            <li data-fr="3 heures (18h-21h ou selon coucher du soleil)" data-en="3 hours (6pm-9pm or according to sunset)"></li>
                            <li data-fr="11 passagers max" data-en="Up to 11 passengers"></li>
                            <li data-fr="Skipper" data-en="Skipper"></li>
                            <li data-fr="Paddle" data-en="Paddle"></li>
                            <li data-fr="SeaBob" data-en="SeaBob"></li>
                            <li data-fr="Snorkeling" data-en="Snorkeling"></li>
                            <li data-fr="Système son Bluetooth" data-en="Bluetooth sound system"></li>
                            <li data-fr="Assurance RC" data-en="Liability insurance"></li>
                        </ul>
                        <p data-fr="Carburant non inclus (estimation : 100-150 €)" data-en="Fuel not included (estimate: 100-150 €)"></p>
                        <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
                    </div>

                    <div class="tarif-card">
                        <h3 data-fr="Journée en mer" data-en="Day at sea"></h3>
                        <div class="tarif-price">
                            <span data-fr="À partir de" data-en="From"></span>
                            <span data-fr="2 700 €" data-en="2 700 €"></span>
                            <span data-fr="TTC" data-en="VAT included"></span>
                        </div>
                        <ul class="tarif-includes">
                            <li data-fr="8 heures (9h-17h)" data-en="8 hours (9am-5pm)"></li>
                            <li data-fr="11 passagers max" data-en="Up to 11 passengers"></li>
                            <li data-fr="Skipper" data-en="Skipper"></li>
                            <li data-fr="Paddle" data-en="Paddle"></li>
                            <li data-fr="SeaBob" data-en="SeaBob"></li>
                            <li data-fr="Snorkeling" data-en="Snorkeling"></li>
                            <li data-fr="Système son Bluetooth" data-en="Bluetooth sound system"></li>
                            <li data-fr="Assurance RC" data-en="Liability insurance"></li>
                        </ul>
                        <p data-fr="Carburant non inclus (estimation : 200-350 €)" data-en="Fuel not included (estimate: 200-350 €)"></p>
                        <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
                    </div>

                    <div class="tarif-card">
                        <h3 data-fr="Journée Prestige" data-en="Prestige Day"></h3>
                        <div class="tarif-price">
                            <span data-fr="À partir de" data-en="From"></span>
                            <span data-fr="3 800 €" data-en="3 800 €"></span>
                            <span data-fr="TTC" data-en="VAT included"></span>
                        </div>
                        <ul class="tarif-includes">
                            <li data-fr="10 heures (9h-19h)" data-en="10 hours (9am-7pm)"></li>
                            <li data-fr="11 passagers max" data-en="Up to 11 passengers"></li>
                            <li data-fr="Skipper" data-en="Skipper"></li>
                            <li data-fr="Paddle" data-en="Paddle"></li>
                            <li data-fr="SeaBob" data-en="SeaBob"></li>
                            <li data-fr="Snorkeling" data-en="Snorkeling"></li>
                            <li data-fr="Système son Bluetooth" data-en="Bluetooth sound system"></li>
                            <li data-fr="Assurance RC" data-en="Liability insurance"></li>
                        </ul>
                        <p data-fr="Carburant non inclus (estimation : 400-600 €)" data-en="Fuel not included (estimate: 400-600 €)"></p>
                        <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
                    </div>
                </div>
            </div>
        </section>

        <section class="section tarifs-fuel fade-in">
            <div class="container">
                <h2 data-fr="Estimation du carburant" data-en="Fuel estimate"></h2>
                <p data-fr="Le carburant est facturé au réel selon l'itinéraire choisi. Voici des estimations indicatives :" data-en="Fuel is billed at actual cost according to the chosen itinerary. Here are indicative estimates:"></p>
                <div class="fuel-estimates">
                    <div class="fuel-estimate">
                        <h3 data-fr="Sunset (côte locale)" data-en="Sunset (local coast)"></h3>
                        <p data-fr="100-150 €" data-en="100-150 €"></p>
                    </div>
                    <div class="fuel-estimate">
                        <h3 data-fr="Journée Côte d'Azur" data-en="French Riviera day"></h3>
                        <p data-fr="200-350 €" data-en="200-350 €"></p>
                    </div>
                    <div class="fuel-estimate">
                        <h3 data-fr="Saint-Tropez A/R" data-en="Saint-Tropez round trip"></h3>
                        <p data-fr="400-600 €" data-en="400-600 €"></p>
                    </div>
                </div>
                <p data-fr="Le skipper vous informera de l'estimation carburant avant le départ selon l'itinéraire demandé." data-en="The skipper will inform you of the fuel estimate before departure according to the requested itinerary."></p>
            </div>
        </section>

        <section class="section cta-section fade-in">
            <div class="container">
                <h2 data-fr="Prêt à réserver ?" data-en="Ready to book?"></h2>
                <p data-fr="Contactez-nous pour plus d'informations ou réservez directement en ligne" data-en="Contact us for more information or book directly online"></p>
                <a href="reservation.html" class="cta-button" data-fr="Réserver maintenant" data-en="Book now"></a>
            </div>
        </section>
