<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Charter - Réservation</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg width="100" height="40" viewBox="0 0 100 40">
                <path d="M0,0 L100,0 L100,40 L0,40 Z" fill="#070F1B"/>
                <text x="10" y="25" font-family="'Playfair Display', serif" font-size="20" fill="#FFFFFF">PRESTIGE</text>
                <text x="70" y="25" font-family="'Playfair Display', serif" font-size="20" font-weight="bold" fill="#C9A84C">CHARTER</text>
                <path d="M50,0 L50,10 L45,15 L50,20 L55,15 L50,10 Z" fill="#C9A84C" transform="translate(0, 5)"/>
            </svg>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="yacht.html">Le Yacht</a></li>
                <li><a href="experiences.html">Expériences</a></li>
                <li><a href="tarifs.html">Tarifs</a></li>
                <li><a href="reservation.html" class="active">Réservation</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="language-toggle">
            <button data-fr="FR" data-en="EN">FR</button>
        </div>
    </header>

    <main>
        <section class="hero reservation-hero" style="background-image: url('images/Arrière%20V2.jpeg');">
            <div class="hero-content">
                <h1 data-fr="Réservation" data-en="Booking"></h1>
                <p data-fr="Réservez votre expérience de luxe en mer" data-en="Book your luxury sea experience"></p>
                <a href="#reservation-form" class="cta-button" data-fr="Réserver maintenant" data-en="Book now"></a>
            </div>
        </section>

        <section class="section reservation-intro fade-in">
            <div class="container">
                <h2 data-fr="Comment réserver" data-en="How to book"></h2>
                <p data-fr="Pour réserver votre expérience à bord de l'Artemis, veuillez remplir le formulaire ci-dessous ou nous contacter directement." data-en="To book your experience aboard the Artemis, please fill out the form below or contact us directly."></p>
                <p data-fr="Un acompte de 30% est requis à la réservation. Le solde doit être payé 48h avant la prestation." data-en="A 30% deposit is required at booking. The balance must be paid 48 hours before the service."></p>
            </div>
        </section>

        <section class="section reservation-form-container fade-in" id="reservation-form">
            <div class="container">
                <h2 data-fr="Formulaire de réservation" data-en="Booking form"></h2>
                <form class="reservation-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name" data-fr="Nom" data-en="Name"></label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email" data-fr="Email" data-en="Email"></label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone" data-fr="Téléphone" data-en="Phone"></label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="date" data-fr="Date" data-en="Date"></label>
                            <input type="date" id="date" name="date" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="offer" data-fr="Offre" data-en="Offer"></label>
                            <select id="offer" name="offer" required>
                                <option value="" data-fr="Sélectionnez une offre" data-en="Select an offer"></option>
                                <option value="sunset" data-fr="Sunset Experience" data-en="Sunset Experience"></option>
                                <option value="day" data-fr="Journée en mer" data-en="Day at sea"></option>
                                <option value="prestige" data-fr="Journée Prestige" data-en="Prestige Day"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="passengers" data-fr="Nombre de passagers" data-en="Number of passengers"></label>
                            <input type="number" id="passengers" name="passengers" min="1" max="11" value="1" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="itinerary" data-fr="Itinéraire souhaité" data-en="Desired itinerary"></label>
                            <input type="text" id="itinerary" name="itinerary" placeholder="Ex: Monaco, Èze-sur-Mer...">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group checkbox-group">
                            <label data-fr="Options supplémentaires" data-en="Additional options"></label>
                            <div class="checkbox-option">
                                <input type="checkbox" id="chef" name="chef" value="chef">
                                <label for="chef" data-fr="Chef privé à bord (500 €)" data-en="Private chef onboard (500 €)"></label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="champagne" name="champagne" value="champagne">
                                <label for="champagne" data-fr="Bouteille Dom Pérignon (350 €)" data-en="Dom Pérignon bottle (350 €)"></label>
                            </div>
                            <div class="checkbox-option">
                                <input type="checkbox" id="photographer" name="photographer" value="photographer">
                                <label for="photographer" data-fr="Photographe/Vidéaste (800 €)" data-en="Photographer/Videographer (800 €)"></label>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="message" data-fr="Message" data-en="Message"></label>
                            <textarea id="message" name="message" rows="4"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="payment" data-fr="Méthode de paiement" data-en="Payment method"></label>
                            <select id="payment" name="payment" required>
                                <option value="" data-fr="Sélectionnez une méthode" data-en="Select a method"></option>
                                <option value="virement" data-fr="Virement bancaire" data-en="Bank transfer"></option>
                                <option value="carte" data-fr="Carte bancaire" data-en="Credit card"></option>
                                <option value="especes" data-fr="Espèces" data-en="Cash"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms" data-fr="J'accepte les conditions générales de vente" data-en="I accept the terms and conditions"></label>
                        </div>
                    </div>

                    <div class="form-row">
                        <button type="submit" class="cta-button" data-fr="Envoyer la réservation" data-en="Submit booking"></button>
                    </div>
                </form>
            </div>
        </section>

        <section class="section reservation-conditions fade-in">
            <div class="container">
                <h2 data-fr="Conditions de réservation" data-en="Booking conditions"></h2>

                <div class="conditions-section">
                    <h3 data-fr="Annulation" data-en="Cancellation"></h3>
                    <ul>
                        <li data-fr="J-7 ou plus : remboursement intégral de l'acompte" data-en="More than 7 days before: full refund of the deposit"></li>
                        <li data-fr="J-7 à J-3 : acompte conservé, report possible" data-en="Between 7 and 3 days before: deposit kept, rescheduling possible"></li>
                        <li data-fr="Moins de J-3 : aucun remboursement" data-en="Less than 3 days before: no refund"></li>
                    </ul>
                </div>

                <div class="conditions-section">
                    <h3 data-fr="Météo" data-en="Weather"></h3>
                    <p data-fr="Si annulation pour météo par le skipper : report ou remboursement intégral" data-en="If cancellation for weather by the skipper: rescheduling or full refund"></p>
                </div>
            </div>
        </section>

        <section class="section cta-section fade-in">
            <div class="container">
                <h2 data-fr="Besoin d'aide ?" data-en="Need help?"></h2>
                <p data-fr="Contactez-nous pour toute question concernant votre réservation" data-en="Contact us for any questions about your booking"></p>
                <div class="contact-buttons">
                    <a href="tel:+33652192414" class="cta-button" data-fr="Appeler" data-en="Call"></a>
                    <a href="https://wa.me/33652192414" class="cta-button" data-fr="WhatsApp" data-en="WhatsApp"></a>
                    <a href="mailto:prestigecharter06@gmail.com" class="cta-button" data-fr="Email" data-en="Email"></a>
                </div>
            </div>
        </section>
    </main>

            </div>
        </div>
        <div class="footer-bottom">
            <p data-fr="© 2023 Prestige Charter AT. Tous droits réservés." data-en="© 2023 Prestige Charter AT. All rights reserved."></p>
