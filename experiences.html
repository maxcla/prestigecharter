    <main>
        <section class="hero experiences-hero">
            <div class="hero-content">
                <h1 data-fr="Expériences inoubliables" data-en="Unforgettable experiences"></h1>
                <p data-fr="Découvrez la Côte d'Azur comme jamais auparavant" data-en="Discover the French Riviera like never before"></p>
                <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
            </div>
        </section>

        <section class="section experiences-intro fade-in">
            <div class="container">
                <h2 data-fr="Votre aventure commence ici" data-en="Your adventure begins here"></h2>
                <p data-fr="Que vous cherchiez une escapade romantique, une célébration entre amis ou une expérience familiale, le yacht Artemis vous offre des moments inoubliables sur la Côte d'Azur." data-en="Whether you're looking for a romantic getaway, a celebration with friends, or a family experience, the yacht Artemis offers unforgettable moments on the French Riviera."></p>
            </div>
        </section>

        <section class="section experiences-grid fade-in">
            <div class="container">
                <h2 data-fr="Nos expériences" data-en="Our experiences"></h2>
                <div class="experiences-container">
                    <div class="experience-card">
                        <img src="images/yacht-3.webp" alt="Sunset experience" loading="lazy">
                        <div class="experience-content">
                            <h3 data-fr="Sunset Experience" data-en="Sunset Experience"></h3>
                            <p data-fr="Profitez d'un coucher de soleil magique en mer. 3 heures de pure détente et de contemplation." data-en="Enjoy a magical sunset at sea. 3 hours of pure relaxation and contemplation."></p>
                            <a href="tarifs.html" class="cta-button" data-fr="Voir les tarifs" data-en="See prices"></a>
                        </div>
                    </div>
                    <div class="experience-card">
                        <img src="images/hero.jpg" alt="Journée en mer" loading="lazy">
                        <div class="experience-content">
                            <h3 data-fr="Journée en mer" data-en="Day at sea"></h3>
                            <p data-fr="Passez une journée complète à explorer les plus beaux spots de la Côte d'Azur." data-en="Spend a full day exploring the most beautiful spots on the French Riviera."></p>
                            <a href="tarifs.html" class="cta-button" data-fr="Voir les tarifs" data-en="See prices"></a>
                        </div>
                    </div>
                    <div class="experience-card">
                        <img src="images/yacht-2.webp" alt="Journée prestige" loading="lazy">
                        <div class="experience-content">
                            <h3 data-fr="Journée Prestige" data-en="Prestige Day"></h3>
                            <p data-fr="Vivez une expérience haut de gamme avec service premium et options exclusives." data-en="Live a high-end experience with premium service and exclusive options."></p>
                            <a href="tarifs.html" class="cta-button" data-fr="Voir les tarifs" data-en="See prices"></a>
                        </div>
                    </div>
                </div>
            </div>

        <section class="section experiences-itineraries fade-in">
            <div class="container">
                <h2 data-fr="Itinéraires suggérés" data-en="Suggested itineraries"></h2>
                <div class="itineraries-grid">
                    <div class="itinerary-card">
                        <h3 data-fr="Monaco & Èze-sur-Mer" data-en="Monaco & Èze-sur-Mer"></h3>
                        <p data-fr="Découvrez le glamour de Monaco et les paysages spectaculaires d'Èze-sur-Mer." data-en="Discover the glamour of Monaco and the spectacular landscapes of Èze-sur-Mer."></p>
                    </div>
                    <div class="itinerary-card">
                        <h3 data-fr="Beaulieu / Villefranche-sur-Mer" data-en="Beaulieu / Villefranche-sur-Mer"></h3>
                        <p data-fr="Explorez ces deux joyaux de la Côte d'Azur avec leurs criques secrètes et leurs eaux cristallines." data-en="Explore these two jewels of the French Riviera with their secret coves and crystal-clear waters."></p>
                    </div>
                    <div class="itinerary-card">
                        <h3 data-fr="Antibes / Cap d'Antibes" data-en="Antibes / Cap d'Antibes"></h3>
                        <p data-fr="Profitez des plages de sable fin et des eaux turquoise de cette région emblématique." data-en="Enjoy the fine sandy beaches and turquoise waters of this iconic region."></p>
                    </div>
                    <div class="itinerary-card">
                        <h3 data-fr="Îles de Lérins (Cannes)" data-en="Lérins Islands (Cannes)"></h3>
                        <p data-fr="Visitez ces îles paradisiaques au large de Cannes, idéales pour la baignade et la détente." data-en="Visit these paradise islands off Cannes, ideal for swimming and relaxation."></p>
                    </div>
                    <div class="itinerary-card">
                        <h3 data-fr="Saint-Tropez (journée complète)" data-en="Saint-Tropez (full day)"></h3>
                        <p data-fr="Découvrez le charme intemporel de Saint-Tropez lors d'une journée complète d'exploration." data-en="Discover the timeless charm of Saint-Tropez during a full day of exploration."></p>
                    </div>
                </div>
                <p data-fr="Le skipper adaptera l'itinéraire selon vos préférences et les conditions météo." data-en="The skipper will adapt the itinerary according to your preferences and weather conditions."></p>
            </div>
        </section>

        <section class="section experiences-extras fade-in">
            <div class="container">
                <h2 data-fr="Options exclusives" data-en="Exclusive options"></h2>
                <div class="extras-grid">
                    <div class="extra-card">
                        <h3 data-fr="Chef privé à bord" data-en="Private chef on board"></h3>
                        <p data-fr="500 €" data-en="500 €"></p>
                        <p data-fr="Profitez d'un repas gastronomique préparé par un chef privé à bord." data-en="Enjoy a gourmet meal prepared by a private chef on board."></p>
                    </div>
                    <div class="extra-card">
                        <h3 data-fr="Bouteille Dom Pérignon" data-en="Dom Pérignon bottle"></h3>
                        <p data-fr="350 €" data-en="350 €"></p>
                        <p data-fr="Célébrez avec une bouteille de champagne prestigieux." data-en="Celebrate with a bottle of prestigious champagne."></p>
                    </div>
                    <div class="extra-card">
                        <h3 data-fr="Photographe/Vidéaste" data-en="Photographer/Videographer"></h3>
                        <p data-fr="800 €" data-en="800 €"></p>
                        <p data-fr="Immortalisez vos moments avec un professionnel." data-en="Immortalize your moments with a professional."></p>
                    </div>
                </div>
            </div>

        <section class="section cta-section fade-in">
            <div class="container">
                <h2 data-fr="Prêt à vivre l'aventure ?" data-en="Ready for the adventure?"></h2>
                <p data-fr="Réservez votre expérience de luxe dès maintenant" data-en="Book your luxury experience now"></p>
                <a href="reservation.html" class="cta-button" data-fr="Réserver" data-en="Book now"></a>
